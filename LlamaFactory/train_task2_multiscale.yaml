### Task2 Multiscale: 最强方案突破 eval_loss 瓶颈
### 核心：composite + 4 panels = 5 张图，给模型全局上下文 + 局部细节
### 数据：基于 Enhanced（长答案 + 风格指导），加入 composite 拼接

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-VL-7B-Instruct-Full
# 尝试加载 Task1 最优 multiscale 模型的初始化
adapter_name_or_path: /root/autodl-tmp/LlamaFactory/saves/qwen2.5-vl-lora-MS-BaselinePrompt-SCPM/checkpoint-250
template: qwen2_vl
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.1
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

dataset_dir: /root/autodl-tmp/LlamaFactory/data/ccac2025_complete
dataset: ccac2025_task2_train_multiscale
eval_dataset: ccac2025_task2_valid_multiscale

do_eval: true
eval_strategy: steps
eval_steps: 200
per_device_eval_batch_size: 1
eval_on_start: true
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
save_strategy: steps
save_steps: 200
save_total_limit: 4
save_only_model: true

learning_rate: 1.5e-5
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 0.5
weight_decay: 0.02

optim: adamw_torch
bf16: true
flash_attn: auto

freeze_vision_tower: true
freeze_multi_modal_projector: false
image_max_pixels: 262144
image_min_pixels: 1024

logging_steps: 10
plot_loss: true

output_dir: saves/qwen2.5-vl-lora-task2-multiscale
overwrite_output_dir: true

ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false
enable_thinking: false
dataloader_num_workers: 4
group_by_length: false
# 5张图 + 长prompt + 长answer，需要更大的cutoff
cutoff_len: 4096
max_samples: 100000
preprocessing_num_workers: 2
