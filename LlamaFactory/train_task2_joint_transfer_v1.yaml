### Joint Transfer v1: 从 V3-full Task1 迁移 + 联合训练 Task1+Task2
### 核心假设: Task1 学到的深度漫画视觉理解迁移到 Task2，联合训练防止遗忘

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-VL-7B-Instruct-Full
template: qwen2_vl
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
adapter_name_or_path: saves/qwen2.5-vl-lora-V3-full/checkpoint-300
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.15
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
dataset_dir: /root/autodl-tmp/LlamaFactory/data/ccac2025_complete
dataset: ccac2025_joint_v2_train
eval_dataset: ccac2025_task2_valid

### evaluation
do_eval: true
eval_strategy: steps
eval_steps: 100
per_device_eval_batch_size: 2
eval_on_start: true
load_best_model_at_end: false
save_strategy: steps
save_steps: 100
save_total_limit: 3
save_only_model: true

### training
learning_rate: 1.5e-5
num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.05

### optimization
optim: adamw_torch
bf16: true
flash_attn: auto

### vision
freeze_vision_tower: true
freeze_multi_modal_projector: false
image_max_pixels: 262144
image_min_pixels: 1024

### logging
logging_steps: 10
plot_loss: true

### output
output_dir: saves/qwen2.5-vl-lora-task2-joint-transfer-v1
overwrite_output_dir: true

### misc
ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false
enable_thinking: false
dataloader_num_workers: 4
group_by_length: true
cutoff_len: 3072
max_samples: 100000
preprocessing_num_workers: 8
