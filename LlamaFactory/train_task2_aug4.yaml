### Task2 全位置遮蔽增强 + 混合语言联合训练
### 数据：2436条（609漫画 × 4 mask位置），中英文混合

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-VL-7B-Instruct-Full
template: qwen2_vl
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.1
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
dataset_dir: /root/autodl-tmp/LlamaFactory/data/ccac2025_complete
dataset: ccac2025_task2_train_aug4_all
eval_dataset: ccac2025_task2_valid

### evaluation - 2436 samples / batch 8 = ~305 steps/epoch
do_eval: true
eval_strategy: steps
eval_steps: 30
per_device_eval_batch_size: 1
eval_on_start: true
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
save_strategy: steps
save_steps: 30
save_total_limit: 3

### training
learning_rate: 2e-5
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr_scheduler_type: cosine
warmup_ratio: 0.06
max_grad_norm: 0.5
weight_decay: 0.03

### optimization
optim: adamw_torch
bf16: true
flash_attn: auto

### vision
freeze_vision_tower: true
freeze_multi_modal_projector: false
image_max_pixels: 262144
image_min_pixels: 1024

### logging
logging_steps: 10
plot_loss: true

### output
output_dir: saves/qwen2.5-vl-lora-task2-aug4
overwrite_output_dir: true

### misc
ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false
enable_thinking: false
dataloader_num_workers: 4
group_by_length: false
cutoff_len: 3072
max_samples: 100000
preprocessing_num_workers: 1
