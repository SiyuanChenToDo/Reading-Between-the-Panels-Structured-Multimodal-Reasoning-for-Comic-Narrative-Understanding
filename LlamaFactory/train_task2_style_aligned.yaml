### Task2 Style-Aligned: 用风格引导对齐验证集描述风格
### 核心改进: prompt 中加入风格指导，让模型学习验证集特定的模板化表达

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-VL-7B-Instruct-Full
template: qwen2_vl
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.1
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
dataset_dir: /root/autodl-tmp/LlamaFactory/data/ccac2025_complete
dataset: ccac2025_task2_train_style
eval_dataset: ccac2025_task2_valid_style

### evaluation
do_eval: true
eval_strategy: steps
eval_steps: 80
per_device_eval_batch_size: 2
eval_on_start: true
load_best_model_at_end: false
save_strategy: steps
save_steps: 80
save_total_limit: 3
save_only_model: true

### training
learning_rate: 1.5e-5
num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.01

### optimization
optim: adamw_torch
bf16: true
flash_attn: auto

### vision
freeze_vision_tower: true
freeze_multi_modal_projector: false
image_max_pixels: 262144
image_min_pixels: 1024

### logging
logging_steps: 10
plot_loss: true

### output
output_dir: saves/qwen2.5-vl-lora-task2-style-aligned
overwrite_output_dir: true

### misc
ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false
enable_thinking: false
dataloader_num_workers: 4
group_by_length: true
cutoff_len: 3072
max_samples: 100000
preprocessing_num_workers: 8
