### Task2 v3: 防过拟合，突破 eval_loss 瓶颈
### 核心改进：
### 1. 原始数据 3972 条（不过采样，防止记忆）
### 2. 精简 prompt（去掉冗余 CoT）
### 3. 大 batch + 低 lr + 强正则化
### 4. 只训 2 epoch

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-VL-7B-Instruct-Full
template: qwen2_vl
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.1
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

dataset_dir: /root/autodl-tmp/LlamaFactory/data/ccac2025_complete
dataset: ccac2025_task2_train_v3
eval_dataset: ccac2025_task2_valid_v3

do_eval: true
eval_strategy: steps
eval_steps: 100
per_device_eval_batch_size: 1
eval_on_start: true
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
save_strategy: steps
save_steps: 100
save_total_limit: 3
save_only_model: true

learning_rate: 5.0e-6
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
lr_scheduler_type: cosine
warmup_ratio: 0.2
max_grad_norm: 0.5
weight_decay: 0.1

optim: adamw_torch
bf16: true
flash_attn: auto

freeze_vision_tower: true
freeze_multi_modal_projector: false
image_max_pixels: 262144
image_min_pixels: 1024

logging_steps: 10
plot_loss: true

output_dir: saves/qwen2.5-vl-lora-task2-v3
overwrite_output_dir: true

ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false
enable_thinking: false
dataloader_num_workers: 4
group_by_length: false
cutoff_len: 3072
max_samples: 100000
preprocessing_num_workers: 2
